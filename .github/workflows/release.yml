name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build (linux/amd64)
        run: GOOS=linux GOARCH=amd64 go build -o ralph-cli-linux-amd64 .

      - name: Build (linux/arm64)
        run: GOOS=linux GOARCH=arm64 go build -o ralph-cli-linux-arm64 .

      - name: Build (darwin/amd64)
        run: GOOS=darwin GOARCH=amd64 go build -o ralph-cli-darwin-amd64 .

      - name: Build (darwin/arm64)
        run: GOOS=darwin GOARCH=arm64 go build -o ralph-cli-darwin-arm64 .

      - name: Checksums
        run: sha256sum ralph-cli-* > checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ralph-cli-linux-amd64
            ralph-cli-linux-arm64
            ralph-cli-darwin-amd64
            ralph-cli-darwin-arm64
            checksums.txt
